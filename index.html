<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="FitBody — Guia completo e gratuito de exercícios de academia. Encontre exercícios por grupo muscular com instruções detalhadas.">
  <meta name="theme-color" content="#1A1A1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>FitBody — Guia de Exercícios</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  
  <!-- ===== APP SHELL ===== -->
  <div id="app">
    
    <!-- ===== HEADER ===== -->
    <header id="app-header">
      <button id="btn-back" class="header-btn hidden" aria-label="Voltar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1 id="page-title" class="header-title">Exercícios</h1>
      <div id="header-right" class="header-actions"></div>
    </header>

    <!-- ===== MAIN CONTENT (Pages rendered here) ===== -->
    <main id="main-content">
      
      <!-- PAGE: Exercícios (Modelo Anatômico) -->
      <section id="page-exercises" class="page active" data-page="exercises">
        <div id="search-container" class="search-container">
          <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="search-input" placeholder="Pesquisar exercícios..." autocomplete="off">
          </div>
        </div>
        
        <div id="body-model-container" class="body-model-container">
          <!-- SVG body model rendered by JS -->
        </div>
        
        <button id="btn-rotate" class="btn-rotate" aria-label="Rotacionar modelo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
          </svg>
          <span>Rotacionar</span>
        </button>
      </section>

      <!-- PAGE: Lista de Exercícios por Grupo -->
      <section id="page-exercise-list" class="page" data-page="exercise-list">
        <div id="filter-container" class="filter-container">
          <div class="filter-chips" id="filter-chips">
            <!-- Chips rendered by JS -->
          </div>
        </div>
        <div class="sort-bar" id="sort-bar">
          <button class="sort-btn" id="btn-sort">
            <span id="sort-label">Relevância</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <button class="view-toggle" id="btn-view-toggle" aria-label="Alternar visualização">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </button>
        </div>
        <div id="exercise-grid" class="exercise-grid">
          <!-- Exercise cards rendered by JS -->
        </div>
      </section>

      <!-- PAGE: Detalhes do Exercício -->
      <section id="page-exercise-detail" class="page" data-page="exercise-detail">
        <div id="exercise-detail-content" class="exercise-detail-content">
          <!-- Detail content rendered by JS -->
        </div>
      </section>

      <!-- PAGE: Meus Treinos -->
      <section id="page-workouts" class="page" data-page="workouts">
        <div id="workouts-content" class="workouts-content">
          <div class="workouts-header">
            <h2>Meus Treinos</h2>
            <div style="display: flex; gap: var(--space-xs);">
              <button id="btn-reset-workouts" class="btn-secondary" title="Restaurar treinos padrão da rotina" style="padding: 0 12px; font-size: 0.8125rem; height: 38px;">
                <span>Rotina Padrão</span>
              </button>
              <button id="btn-new-workout" class="btn-accent" style="height: 38px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                <span>Novo</span>
              </button>
            </div>
          </div>
          <div id="workouts-list" class="workouts-list">
            <!-- Workout cards rendered by JS -->
          </div>
        </div>
      </section>

      <!-- PAGE: Corpo (Visão Geral) -->
      <section id="page-body" class="page" data-page="body">
        <div id="body-overview-content" class="body-overview-content">
          <!-- Body overview rendered by JS -->
        </div>
      </section>

    </main>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item" data-page="workouts" id="nav-workouts">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
        <span>Treinos</span>
      </button>
      <button class="nav-item" data-page="exercises" id="nav-exercises">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="5" r="3"/>
          <path d="M12 8v4M8 20l2-8h4l2 8M6 14h12"/>
        </svg>
        <span>Exercícios</span>
      </button>
      <button class="nav-item" data-page="body" id="nav-body">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="4" r="2.5"/>
          <path d="M12 6.5v6M8 21l2-8.5h4l2 8.5M5 10h14"/>
        </svg>
        <span>Corpo</span>
      </button>
    </nav>

    <!-- ===== MODALS ===== -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-content" class="modal-content">
        <!-- Modal content rendered by JS -->
      </div>
    </div>

    <!-- ===== SORT DROPDOWN ===== -->
    <div id="sort-dropdown" class="sort-dropdown hidden">
      <button class="sort-option active" data-sort="relevance">Relevância</button>
      <button class="sort-option" data-sort="az">A - Z</button>
      <button class="sort-option" data-sort="za">Z - A</button>
    </div>

    <!-- ===== TOAST NOTIFICATIONS ===== -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/search.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/body-model.js"></script>
  <script src="js/components/exercise-card.js"></script>
  <script src="js/components/filter-chips.js"></script>
  <script src="js/components/search-bar.js"></script>
  <script src="js/pages/exercises.js"></script>
  <script src="js/pages/exercise-list.js"></script>
  <script src="js/pages/exercise-detail.js"></script>
  <script src="js/pages/workouts.js"></script>
  <script src="js/pages/body-overview.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
